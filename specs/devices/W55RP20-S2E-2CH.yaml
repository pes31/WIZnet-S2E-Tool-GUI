# W55RP20-S2E-2CH.yaml
# 2채널 고속 S2E 장비
# 소스 기준: wizcmdset.py W55RP20_2CH_CMDSET

name: W55RP20-S2E-2CH
display_name: "W55RP20-S2E-2CH"
aliases:
  - "W55RP20-S2E-2CH"
family: security_two_port
channels: 2

command_groups:
  - base
  - retransmit
  - security
  - w55rp20_ext
  - two_port

overrides:
  BR:
    regex: "^([0-9]|1[0-9])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"
      "14": "460800"
      "15": "921600"
      "16": "1M"
      "17": "2M"
      "18": "4M"
      "19": "8M"
  OP:
    regex: "^[0-6]$"
    values:
      "0": "TCP Client mode"
      "1": "TCP Server mode"
      "2": "TCP Mixed mode"
      "3": "UDP mode"
      "4": "SSL TCP Client mode"
      "5": "MQTT Client"
      "6": "MQTTS Client"
  # two_port.yaml의 EB도 고속으로 override
  EB:
    regex: "^([0-9]|1[0-9])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"
      "14": "460800"
      "15": "921600"
      "16": "1M"
      "17": "2M"
      "18": "4M"
      "19": "8M"

fw_constraints:
  upload_supported: true
  config_port: 50001
  version_specific:
    - condition: "VR < 1.2.1"
      overrides:
        BR:
          regex: "^([0-9]|1[0-5])$"
          values:
            "0": "300"
            "1": "600"
            "2": "1200"
            "3": "1800"
            "4": "2400"
            "5": "4800"
            "6": "9600"
            "7": "14400"
            "8": "19200"
            "9": "28800"
            "10": "38400"
            "11": "57600"
            "12": "115200"
            "13": "230400"
            "14": "460800"
            "15": "921600"
        EB:
          regex: "^([0-9]|1[0-5])$"
          values:
            "0": "300"
            "1": "600"
            "2": "1200"
            "3": "1800"
            "4": "2400"
            "5": "4800"
            "6": "9600"
            "7": "14400"
            "8": "19200"
            "9": "28800"
            "10": "38400"
            "11": "57600"
            "12": "115200"
            "13": "230400"
            "14": "460800"
            "15": "921600"

ui:
  tabs:
    - id: network
      label: "Network"
      groups:
        - device_info
        - ip_mode
        - op_mode
        - conn_password
        - ssl_options
    - id: serial
      label: "Serial (CH0)"
      groups:
        - serial_info
        - serial_params
        - data_packing
    - id: channel1
      label: "Channel 1"
      groups:
        - ch1_info
        - ch1_op_mode
        - ch1_serial
        - ch1_packing
        - ch1_options
    - id: options
      label: "Options"
      groups:
        - inactivity
        - keepalive
        - trigger
        - search_password
        - tcp_options
        - connection_events
    - id: mqtt
      label: "MQTT"
      groups:
        - mqtt_options
        - mqtt_topics
    - id: certificate
      label: "Certificate"
      groups:
        - cert_options
        - cert_upload
