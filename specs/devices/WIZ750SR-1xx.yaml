# WIZ750SR-1xx.yaml
# WIZ750SR-100, WIZ750SR-105, WIZ750SR-110, WIZ750SR-T1L 포함

name: WIZ750SR-1xx
display_name: "WIZ750SR-1xx"
aliases:
  - "WIZ750SR-1xx"
  - "WIZ750SR-100"
  - "WIZ750SR-105"
  - "WIZ750SR-110"
  - "WIZ750SR-T1L"
family: one_port
channels: 1
search_cmd_order:
  - MC
  - VR
  - MN
  - UN
  - ST
  - IM
  - OP
  - CP
  - DG
  - KA
  - KI
  - KE
  - RI
  - LI
  - SM
  - GW
  - DS
  - LP
  - RP
  - RH
  - BR
  - DB
  - PR
  - SB
  - FL
  - IT
  - PT
  - PS
  - PD
  - TE
  - SS
  - NP
  - SP
  - SC
  - TR
  - S0
  - S1

command_groups:
  - base
  - retransmit
  - gpio

overrides:
  # BR: WIZ750SR-1xx 최대 230400 (index 0-13)
  BR:
    regex: "^([0-9]|1[0-3])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"

fw_constraints:
  upload_supported: true
  config_port: 50001

ui:
  tabs:
    - id: network
      label: "Network"
      groups:
        - device_info
        - ip_mode
        - op_mode
        - conn_password
    - id: serial
      label: "Serial"
      groups:
        - serial_info
        - serial_params
        - data_packing
    - id: options
      label: "Options"
      groups:
        - inactivity
        - keepalive
        - trigger
        - search_password
        - tcp_options
    - id: userio
      label: "User I/O"
      groups:
        - gpio
