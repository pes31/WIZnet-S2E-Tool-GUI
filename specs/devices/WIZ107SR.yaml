# WIZ107SR.yaml
# 소스 기준: ConfigTool107_source_v1.4.4.1, .claude/wiz107-flow-reference.md

name: WIZ107SR
display_name: "WIZ107SR"
aliases:
  - "WIZ107SR"
family: one_port
channels: 1
search_cmd_order:
  - MC
  - VR
  - MN
  - UN
  - ST
  - IM
  - OP
  - DD
  - CP
  - PO
  - DG
  - KA
  - KI
  - KE
  - RI
  - LI
  - SM
  - GW
  - DS
  - PI
  - PP
  - DX
  - DP
  - DI
  - DW
  - DH
  - LP
  - RP
  - RH
  - BR
  - DB
  - PR
  - SB
  - FL
  - IT
  - PT
  - PS
  - PD
  - TE
  - SS
  - NP
  - SP

command_groups:
  - base
  - ddns
  - pppoe
  - telnet

overrides:
  # PPPoE 모드 추가 (IM=2)
  IM:
    regex: "^[0-2]$"
    values:
      "0": "Static IP"
      "1": "DHCP"
      "2": "PPPoE"
  # 9-bit 데이터 비트 추가
  DB:
    regex: "^[0-2]$"
    values:
      "0": "7-bit"
      "1": "8-bit"
      "2": "9-bit"
    # 9-bit 선택 시 PR=NONE, SB=1 강제 (UI 레이어에서 처리)
  # BR: WIZ107SR은 최대 230400 (index 0-13)
  BR:
    regex: "^([0-9]|1[0-3])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"

fw_constraints:
  upload_supported: true
  hw_version_field: VR          # VR 응답의 major 버전으로 신/구형 판별
  new_hw_major_versions: [3, 4, 5, 7]
  # 신형: 51K < file < 64K → 실제 전송 51*1024=52224 bytes
  new_fw_effective_size: 52224
  # 구형: file ≤ 51K
  old_fw_max_size: 52224
  upload_port_from_response: true  # FW 응답에서 동적으로 포트 파싱
  config_port: 50001

ui:
  tabs:
    - id: network
      label: "Network"
      groups:
        - device_info
        - ip_mode
        - pppoe
        - op_mode
        - protocol
        - ddns
        - conn_password
    - id: serial
      label: "Serial"
      groups:
        - serial_info
        - serial_params
        - data_packing
    - id: options
      label: "Options"
      groups:
        - inactivity
        - keepalive
        - trigger
        - search_password
