# WIZ752SR-12x.yaml
# 2포트 S2E 장비
# 소스 기준: WIZMakeCMD.py TWO_PORT_DEV, wizcmdset.py WIZ752_CMDSET

name: WIZ752SR-12x
display_name: "WIZ752SR-12x"
aliases:
  - "WIZ752SR-12x"
  - "WIZ752SR-120"
  - "WIZ752SR-125"
family: two_port
channels: 2
search_cmd_order:
  - MC
  - VR
  - MN
  - UN
  - ST
  - QS
  - EN
  - IM
  - OP
  - QO
  - CP
  - DG
  - KA
  - RA
  - KI
  - RS
  - KE
  - RE
  - RI
  - RR
  - LI
  - SM
  - GW
  - DS
  - LP
  - QL
  - RP
  - QP
  - RH
  - QH
  - BR
  - EB
  - DB
  - ED
  - PR
  - EP
  - SB
  - ES
  - FL
  - EF
  - IT
  - RV
  - PT
  - NT
  - PS
  - NS
  - PD
  - ND
  - TE
  - SS
  - NP
  - SP

command_groups:
  - base
  - two_port

overrides:
  # WIZ752SR BR 최대 230400 (0-13)
  BR:
    regex: "^([0-9]|1[0-3])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"

fw_constraints:
  upload_supported: true
  config_port: 50001

ui:
  tabs:
    - id: network
      label: "Network"
      groups:
        - device_info
        - ip_mode
        - op_mode
        - conn_password
    - id: serial
      label: "Serial (CH0)"
      groups:
        - serial_info
        - serial_params
        - data_packing
    - id: channel1
      label: "Channel 1"
      groups:
        - ch1_info
        - ch1_op_mode
        - ch1_serial
        - ch1_packing
        - ch1_options
    - id: options
      label: "Options"
      groups:
        - inactivity
        - keepalive
        - trigger
        - search_password
