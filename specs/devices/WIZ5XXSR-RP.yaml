# WIZ5XXSR-RP.yaml
# 보안 S2E 장비 (SSL/MQTT 지원)
# 소스 기준: WIZMakeCMD.py SECURITY_DEVICE, cmd_security_base + cmd_wiz5xxsr_added

name: WIZ5XXSR-RP
display_name: "WIZ5XXSR-RP"
aliases:
  - "WIZ5XXSR-RP"
family: security
channels: 1
search_cmd_order:
  - MC
  - VR
  - MN
  - IM
  - OP
  - CP
  - DG
  - KA
  - KI
  - KE
  - RI
  - LI
  - SM
  - GW
  - DS
  - DH
  - LP
  - RP
  - RH
  - BR
  - DB
  - PR
  - SB
  - FL
  - IT
  - PT
  - PS
  - PD
  - TE
  - SS
  - NP
  - SP
  - UN
  - ST
  - EC
  - SC
  - TR
  - QU
  - QP
  - QC
  - QK
  - PU
  - U0
  - U1
  - U2
  - QO
  - RC
  - CE
  - SO
  - UF

command_groups:
  - base
  - security

overrides:
  # BR: WIZ5XXSR-RP 최대 460800 (index 0-14)
  BR:
    regex: "^([0-9]|1[0-4])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"
      "14": "460800"
  # SSL/MQTT 지원하는 OP 확장
  OP:
    regex: "^[0-6]$"
    values:
      "0": "TCP Client mode"
      "1": "TCP Server mode"
      "2": "TCP Mixed mode"
      "3": "UDP mode"
      "4": "SSL TCP Client mode"
      "5": "MQTT Client"
      "6": "MQTTS Client"

fw_constraints:
  upload_supported: true
  config_port: 50001

ui:
  tabs:
    - id: network
      label: "Network"
      groups:
        - device_info
        - ip_mode
        - op_mode
        - conn_password
        - ssl_options
    - id: serial
      label: "Serial"
      groups:
        - serial_info
        - serial_params
        - data_packing
    - id: options
      label: "Options"
      groups:
        - inactivity
        - keepalive
        - trigger
        - search_password
        - tcp_options
    - id: mqtt
      label: "MQTT"
      groups:
        - mqtt_options
        - mqtt_topics
    - id: certificate
      label: "Certificate"
      groups:
        - cert_options
        - cert_upload
