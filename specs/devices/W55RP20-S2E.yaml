# W55RP20-S2E.yaml
# 고속 Baudrate + SSL/MQTT + 연결 이벤트 데이터 지원
# 소스 기준: wizcmdset.py W55RP20_CMDSET

name: W55RP20-S2E
display_name: "W55RP20-S2E"
aliases:
  - "W55RP20-S2E"
family: security
channels: 1
search_cmd_order:
  - MC
  - VR
  - MN
  - IM
  - OP
  - CP
  - DG
  - KA
  - KI
  - KE
  - RI
  - LI
  - SM
  - GW
  - DS
  - DH
  - LP
  - RP
  - RH
  - BR
  - DB
  - PR
  - SB
  - FL
  - IT
  - PT
  - PS
  - PD
  - TE
  - SS
  - NP
  - SP
  - UN
  - ST
  - EC
  - SC
  - TR
  - QU
  - QP
  - QC
  - QK
  - PU
  - U0
  - U1
  - U2
  - QO
  - RC
  - CE
  - SD
  - DD
  - SE

command_groups:
  - base
  - retransmit
  - security
  - w55rp20_ext

overrides:
  # 고속 Baudrate (FW >= 1.2.1에서 index 0-19 지원)
  # FW 버전에 따라 device_spec_loader가 런타임에 조정
  BR:
    regex: "^([0-9]|1[0-9])$"
    values:
      "0": "300"
      "1": "600"
      "2": "1200"
      "3": "1800"
      "4": "2400"
      "5": "4800"
      "6": "9600"
      "7": "14400"
      "8": "19200"
      "9": "28800"
      "10": "38400"
      "11": "57600"
      "12": "115200"
      "13": "230400"
      "14": "460800"
      "15": "921600"
      "16": "1M"
      "17": "2M"
      "18": "4M"
      "19": "8M"
  OP:
    regex: "^[0-6]$"
    values:
      "0": "TCP Client mode"
      "1": "TCP Server mode"
      "2": "TCP Mixed mode"
      "3": "UDP mode"
      "4": "SSL TCP Client mode"
      "5": "MQTT Client"
      "6": "MQTTS Client"

fw_constraints:
  upload_supported: true
  config_port: 50001
  # BR index 0-15 fallback when FW < 1.2.1
  version_specific:
    - condition: "VR < 1.2.1"
      overrides:
        BR:
          regex: "^([0-9]|1[0-5])$"
          values:
            "0": "300"
            "1": "600"
            "2": "1200"
            "3": "1800"
            "4": "2400"
            "5": "4800"
            "6": "9600"
            "7": "14400"
            "8": "19200"
            "9": "28800"
            "10": "38400"
            "11": "57600"
            "12": "115200"
            "13": "230400"
            "14": "460800"
            "15": "921600"

ui:
  tabs:
    - id: network
      label: "Network"
      groups:
        - device_info
        - ip_mode
        - op_mode
        - conn_password
        - ssl_options
    - id: serial
      label: "Serial"
      groups:
        - serial_info
        - serial_params
        - data_packing
    - id: options
      label: "Options"
      groups:
        - inactivity
        - keepalive
        - trigger
        - search_password
        - tcp_options
        - connection_events
    - id: mqtt
      label: "MQTT"
      groups:
        - mqtt_options
        - mqtt_topics
    - id: certificate
      label: "Certificate"
      groups:
        - cert_options
        - cert_upload
