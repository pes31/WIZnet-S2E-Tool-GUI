# retransmit.yaml
# TCP 재전송 및 에코백 커맨드 (WIZ750SR F/W 1.2.0 이상)
# 지원 장비: WIZ750SR, WIZ750SR-1xx, WIZ510SSL, WIZ5XX-RP 계열

TR:
  description: "TCP Retransmission Retry count"
  regex: "^([1-9]|[1-9][0-9]|1[0-9][0-9]|2[0-5][0-5])$"
  values: {}
  access: RW
  ui:
    tab: options
    group: tcp_options
    widget: lineedit
    label: "Retransmission Retry Count (1~255)"
    order: 1

EC:
  description: "Serial Command Echoback Enable"
  regex: "^[0-1]$"
  values: {}
  access: RW
  ui:
    tab: options
    group: tcp_options
    widget: checkbox
    label: "Serial Command Echoback"
    order: 2
