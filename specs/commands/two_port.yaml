# two_port.yaml
# 2포트 장비의 채널 1 커맨드 (WIZ752SR-12x)
# 채널 0 커맨드는 base.yaml 공통 사용
# 소스 기준: wizcmdset.py::WIZ752_CMDSET

QS:
  description: "Operation status for channel 1"
  regex: ""
  values: {}
  access: RO
  ui:
    tab: channel1
    group: ch1_info
    widget: label
    label: "CH1 Status"
    order: 1

EN:
  description: "UART Interface (Str) for channel 1"
  regex: ""
  values: {}
  access: RO
  ui:
    tab: channel1
    group: ch1_info
    widget: label
    label: "CH1 UART Interface"
    order: 2

QO:
  description: "Network Operation Mode for channel 1"
  regex: "^[0-3]$"
  values:
    "0": "TCP Client mode"
    "1": "TCP Server mode"
    "2": "TCP Mixed mode"
    "3": "UDP mode"
  access: RW
  ui:
    tab: channel1
    group: ch1_op_mode
    widget: radiogroup
    label: "CH1 Operation Mode"
    order: 1

QL:
  description: "Local port number for channel 1"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_op_mode
    widget: lineedit
    label: "CH1 Local Port"
    order: 2

QH:
  description: "Remote Host IP address for channel 1"
  regex: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_op_mode
    widget: lineedit
    label: "CH1 Remote Host"
    order: 3
    depends_on: {QO: ["0", "2", "3"]}

QP:
  description: "Remote Host Port number for channel 1"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_op_mode
    widget: lineedit
    label: "CH1 Remote Port"
    order: 4
    depends_on: {QO: ["0", "2", "3"]}

RR:
  description: "TCP Reconnection Interval for channel 1 (ms)"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_op_mode
    widget: lineedit
    label: "CH1 Reconnection Interval (ms)"
    order: 5

EB:
  description: "UART channel 1 Baud rate"
  regex: "^([0-9]|1[0-3])$"
  values:
    "0": "300"
    "1": "600"
    "2": "1200"
    "3": "1800"
    "4": "2400"
    "5": "4800"
    "6": "9600"
    "7": "14400"
    "8": "19200"
    "9": "28800"
    "10": "38400"
    "11": "57600"
    "12": "115200"
    "13": "230400"
  access: RW
  ui:
    tab: channel1
    group: ch1_serial
    widget: combobox
    label: "CH1 Baud Rate"
    order: 1

ED:
  description: "UART channel 1 Data bit length"
  regex: "^[0-1]$"
  values:
    "0": "7-bit"
    "1": "8-bit"
  access: RW
  ui:
    tab: channel1
    group: ch1_serial
    widget: combobox
    label: "CH1 Data Bits"
    order: 2

EP:
  description: "UART channel 1 Parity bit"
  regex: "^[0-2]$"
  values:
    "0": "NONE"
    "1": "ODD"
    "2": "EVEN"
  access: RW
  ui:
    tab: channel1
    group: ch1_serial
    widget: combobox
    label: "CH1 Parity"
    order: 3

ES:
  description: "UART channel 1 Stop bit length"
  regex: "^[0-1]$"
  values:
    "0": "1-bit"
    "1": "2-bit"
  access: RW
  ui:
    tab: channel1
    group: ch1_serial
    widget: combobox
    label: "CH1 Stop Bits"
    order: 4

EF:
  description: "UART channel 1 Flow Control"
  regex: "^[0-2]$"
  values:
    "0": "NONE"
    "1": "XON/XOFF"
    "2": "RTS/CTS"
  access: RW
  ui:
    tab: channel1
    group: ch1_serial
    widget: combobox
    label: "CH1 Flow Control"
    order: 5

NT:
  description: "Time Delimiter for channel 1 (ms)"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_packing
    widget: lineedit
    label: "CH1 Timer (ms)"
    order: 1

NS:
  description: "Size Delimiter for channel 1 (bytes)"
  regex: "^([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_packing
    widget: lineedit
    label: "CH1 Size (bytes)"
    order: 2

ND:
  description: "Char Delimiter for channel 1 (hex)"
  regex: "^([0-9a-fA-F][0-9a-fA-F])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_packing
    widget: lineedit
    label: "CH1 Character (hex)"
    order: 3

RV:
  description: "Inactivity Timer Value for channel 1 (ms)"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_options
    widget: lineedit
    label: "CH1 Inactivity Timer (ms)"
    order: 1

RA:
  description: "TCP Keep-alive Enable for channel 1"
  regex: "^[0-1]$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_options
    widget: checkbox
    label: "CH1 Keep-alive"
    order: 2

RS:
  description: "TCP Keep-alive Initial Interval for channel 1 (ms)"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_options
    widget: lineedit
    label: "CH1 KA Initial (ms)"
    order: 3
    depends_on: {RA: "1"}

RE:
  description: "TCP Keep-alive Retry Interval for channel 1 (ms)"
  regex: "^([0-9]|[1-9][0-9]{1,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
  values: {}
  access: RW
  ui:
    tab: channel1
    group: ch1_options
    widget: lineedit
    label: "CH1 KA Retry (ms)"
    order: 4
    depends_on: {RA: "1"}
